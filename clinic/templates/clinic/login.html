{% extends "clinic/base.html" %}
{% block title %}Login — MedAssist{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="card w-96 bg-base-100 shadow-2xl">
    <div class="card-body">

      <div class="text-center mb-4">
        <span class="text-5xl">🏥</span>
        <h1 class="text-2xl font-bold mt-2">MedAssist</h1>
        <p class="text-sm opacity-60">Gynecology Clinic Assistant</p>
      </div>

      {% if form.errors %}
      <div role="alert" class="alert alert-error text-sm">
        <span>Invalid username or password. Please try again.</span>
      </div>
      {% endif %}

      <form method="post" action="{% url 'clinic:login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}" />

        <div class="form-control mb-3">
          <label class="label"><span class="label-text font-medium">Username</span></label>
          <input type="text" name="username" autofocus
                 class="input input-bordered w-full"
                 placeholder="Enter your username" />
        </div>

        <div class="form-control mb-6">
          <label class="label"><span class="label-text font-medium">Password</span></label>
          <input type="password" name="password"
                 class="input input-bordered w-full"
                 placeholder="Enter your password" />
        </div>

        <button type="submit" class="btn btn-primary w-full">
          Sign In
        </button>
      </form>

    </div>
  </div>
</div>
{% endblock %}
