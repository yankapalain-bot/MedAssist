{% extends "clinic/base.html" %}
{% block title %}Delete Reminder — MedAssistant{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="card bg-base-100 shadow border border-error">
    <div class="card-body">
      <h2 class="card-title text-error">Delete Reminder</h2>
      <p>Delete "<strong>{{ followupreminder.title }}</strong>" for {{ followupreminder.patient }}?</p>
      <div class="card-actions justify-end mt-4">
        <a href="{% url 'clinic:followupreminder_detail' followupreminder.pk %}" class="btn btn-ghost">Cancel</a>
        <form method="post">{% csrf_token %}<button type="submit" class="btn btn-error">Yes, Delete</button></form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
